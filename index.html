            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            overscroll-behavior-y: none;

        /* Ultra Premium Ambient Background */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(34, 211, 238, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 100% 20%, rgba(168, 85, 247, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 50% 100%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
            filter: saturate(1.5);
            pointer-events: none;
        }

        /* Glassmorphism Refined */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5), inset 0 1px 0 0 rgba(255,255,255,0.05);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            border-color: rgba(34, 211, 238, 0.25);
            background: rgba(30, 41, 59, 0.7);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px -10px rgba(34, 211, 238, 0.15), inset 0 1px 0 0 rgba(255,255,255,0.05);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 1rem); }
        
        /* Text Gradients */
        .text-gradient {
            background: linear-gradient(135deg, #67e8f9 0%, #3b82f6 50%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .text-gradient-cyan {
            background: linear-gradient(to right, #a5f3fc, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Animations */
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
        .animate-shimmer {
            animation: shimmer 2.5s infinite linear;

</head>

                                    <div className="p-6 sm:p-7">
                                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-4 mb-5 pr-14 sm:pr-0">
                                            <h4 className="text-white font-black text-lg group-hover:text-cyan-300 transition-colors flex items-start gap-2.5 leading-tight">
                                                <span className="text-cyan-500 text-xl mt-0.5">•</span> {item.name}
                                            </h4>
                                            {item.info && <div className="shrink-0"><Badge text={item.info} /></div>}
                                        </div>
                                        <div className="flex gap-4 text-sm sm:text-[15px] text-slate-300 mt-2 bg-slate-950/50 p-5 rounded-2xl border border-slate-800/60 shadow-inner">
                                            <div className="w-1.5 bg-gradient-to-b from-cyan-400 to-blue-600 rounded-full shrink-0 h-auto"></div>
                                            <p className="font-medium leading-relaxed">{item.tech.replace('НОВИНКА! ', '')}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Card>
                </div>
            );
        };

        const InsightsView = () => (
            <div className="space-y-8 pb-safe animate-fade-in">
                <Card className="border-purple-500/20 shadow-[0_15px_50px_rgba(168,85,247,0.08)]">
                    <div className="flex items-center gap-5 mb-8 border-b border-slate-700/50 pb-7">
                        <div className="p-4 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-2xl shadow-[0_0_30px_rgba(168,85,247,0.4)] text-white relative">
                            <div className="absolute inset-0 bg-white/20 rounded-2xl animate-pulse"></div>
                            <Icon name="Brain" size={32} className="relative z-10" />
                        </div>
                        <div>
                            <div className="text-[11px] font-black text-purple-400 uppercase tracking-[0.25em] mb-1">Психология</div>
                            <h2 className="text-3xl sm:text-4xl font-black text-white tracking-tighter">MINDSET</h2>
                        </div>
                    </div>

                    <div className="space-y-7">
                        {PLAN_DATA.insights.map((item, i) => (
                            <div key={i} className="relative pl-8 border-l-[3px] border-slate-700 hover:border-purple-500 transition-colors duration-300 group">
                                <div className="absolute -left-[12px] top-1 w-[22px] h-[22px] rounded-full bg-slate-900 border-[3px] border-slate-600 group-hover:bg-purple-500 group-hover:border-purple-300 transition-all shadow-[0_0_15px_rgba(0,0,0,1)] flex items-center justify-center">
                                    <div className="w-2 h-2 rounded-full bg-slate-500 group-hover:bg-white transition-colors"></div>
                                </div>
                                
                                <h3 className="text-xl font-bold text-white mb-3 flex items-center gap-2.5">
                                    <Icon name={item.icon} size={20} className="text-purple-400" />
                                    {item.title}
                                </h3>
                                <div className="space-y-3.5">
                                    <div className="bg-slate-900/80 p-5 rounded-2xl border border-slate-800 shadow-inner">
                                        <div className="text-[11px] font-black text-purple-400 uppercase tracking-[0.2em] mb-2.5 flex items-center gap-2">
                                            <Icon name="Search" size={14} /> {item.why}
                                        </div>
                                        <p className="text-slate-300 text-sm sm:text-[15px] leading-relaxed font-medium">{item.text}</p>
                                    </div>
                                    <div className="flex items-center gap-2.5 text-xs sm:text-sm font-bold text-emerald-400 bg-emerald-950/30 p-3 rounded-xl border border-emerald-500/20 w-fit">
                                        <Icon name="Zap" size={16} />
                                        <span>Результат: <span className="text-emerald-200">{item.result}</span></span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </Card>

                <div className="p-[3px] rounded-[2rem] bg-gradient-to-r from-blue-600 via-cyan-400 to-purple-600 shadow-[0_0_40px_rgba(34,211,238,0.25)] relative overflow-hidden group">
                    <div className="absolute inset-0 bg-white/20 -translate-x-full group-hover:animate-shimmer skew-x-12"></div>
                    <div className="bg-slate-950 rounded-[1.8rem] p-8 sm:p-10 text-center relative overflow-hidden">
                        <div className="absolute inset-0 bg-gradient-to-b from-cyan-500/10 to-transparent"></div>
                        <div className="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black"></div>
                        <div className="relative z-10">
                            <div className="inline-flex items-center justify-center gap-2.5 px-4 py-1.5 bg-slate-900/80 border border-slate-700/50 rounded-full mb-5 shadow-inner">
                                <Icon name="Crown" size={14} className="text-yellow-500" />
                                <span className="text-[10px] sm:text-[11px] font-black text-slate-300 uppercase tracking-[0.25em]">Проект «Каста Феодалов»</span>
                            </div>
                            <h3 className="text-3xl sm:text-4xl font-black text-white mb-3 tracking-tighter drop-shadow-md">MARKOVMADE</h3>
                            <p className="text-slate-400 text-sm sm:text-base mb-8 font-medium">Персональное наставничество. Маша, мы делаем шедевр!</p>
                            
                            <a 
                                href="https://t.me/markovmade" 
                                target="_blank" 
                                className="flex items-center justify-center gap-3 w-full bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-400 hover:to-cyan-400 text-white py-4.5 rounded-2xl font-black text-[15px] uppercase tracking-[0.15em] transition-all shadow-[0_10px_25px_-10px_rgba(34,211,238,0.6)] active:scale-[0.98]"
                            >
                                <Icon name="MessageCircle" size={22} />
                                Отчет Павлу
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        );

        const TabButton = ({ active, onClick, icon, label }) => (
            <button 
                onClick={onClick}
                className="flex-1 group relative flex flex-col items-center justify-center py-2 sm:py-3"
            >
                <div className={`p-2 sm:p-2.5 rounded-[1.25rem] mb-1.5 transition-all duration-300 relative ${
                    active 
                    ? 'bg-gradient-to-br from-cyan-400 to-blue-600 text-white shadow-[0_8px_20px_rgba(34,211,238,0.4)] -translate-y-2' 
                    : 'text-slate-400 group-hover:text-cyan-300 group-hover:bg-slate-800'
                }`}>
                    <Icon name={icon} size={22} strokeWidth={active ? 2.5 : 2} className="relative z-10" />
                    {active && <div className="absolute inset-0 bg-white/25 rounded-[1.25rem] animate-pulse"></div>}
                </div>
                <span className={`text-[10px] sm:text-[11px] font-black tracking-widest transition-colors ${
                    active ? 'text-white drop-shadow-md' : 'text-slate-500'
                }`}>
                    {label}
                </span>
            </button>
        );

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [checks, setChecks] = useState({});
            const [showIntro, setShowIntro] = useState(true);

            useEffect(() => {
                const today = new Date().toISOString().split('T')[0];
                const lastDate = localStorage.getItem('maria_date');
                const storedChecks = JSON.parse(localStorage.getItem('maria_checks') || '{}');

                if (lastDate !== today) {
                    localStorage.setItem('maria_date', today);
                    localStorage.setItem('maria_checks', '{}');
                    setChecks({});
                } else {
                    setChecks(storedChecks);
                }
            }, []);

            const toggleCheck = (idx) => {
                const newChecks = { ...checks, [idx]: !checks[idx] };
                setChecks(newChecks);
                localStorage.setItem('maria_checks', JSON.stringify(newChecks));
            };

            return (
                <div className="min-h-screen relative selection:bg-cyan-500/30 selection:text-cyan-200">
                    
                    {/* Welcome Modal */}
                    {showIntro && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 sm:p-6 bg-slate-950/95 backdrop-blur-2xl animate-in fade-in duration-500 overflow-y-auto">
                            <div className="w-full max-w-[440px] bg-slate-900/90 backdrop-blur-3xl border border-slate-700/50 rounded-[2.5rem] p-7 sm:p-9 shadow-[0_25px_70px_-15px_rgba(34,211,238,0.25)] relative overflow-hidden my-4">
                                <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500"></div>
                                <div className="absolute -top-32 -right-32 w-64 h-64 bg-cyan-500/10 blur-[70px] rounded-full"></div>
                                
                                <div className="text-center mb-8 relative z-10">
                                    <div className="inline-flex items-center gap-2 text-[10px] sm:text-[11px] font-black text-cyan-400 uppercase tracking-[0.4em] mb-4 bg-cyan-950/60 px-4 py-1.5 rounded-full border border-cyan-500/30 shadow-inner">
                                        <Icon name="Crown" size={12} /> MARKOVMADE
                                    </div>
                                    <h1 className="text-5xl sm:text-6xl font-black text-white tracking-tighter mb-2 drop-shadow-md">MARIA <span className="text-gradient">PRO 3.0</span></h1>
                                    <p className="text-slate-400 text-sm sm:text-base font-bold">Новый этап трансформации</p>
                                </div>
                                
                                <div className="space-y-4 text-slate-300 mb-9 text-sm sm:text-[15px] leading-relaxed font-medium text-left relative z-10">
                                    <p className="bg-slate-800/60 p-5 rounded-[1.5rem] border border-slate-700/50 shadow-inner">
                                        <span className="text-white font-black text-base sm:text-lg flex items-center gap-2.5 mb-2"><Icon name="PartyPopper" size={20} className="text-yellow-400" /> Машуль, привет! Начинаем ТРЕТИЙ месяц.</span> 
                                        Я смотрю на твои фото "до/после", и меня просто распирает от гордости. Твое тело кардинально поменялось: силуэт стал точеным, мышцы наливаются плотностью.
                                    </p>
                                    
                                    <p className="px-3">Но самое главное — изменилось твое мышление. Ты больше не рабыня сахара, а дисциплина стала твоим вторым именем. <span className="text-cyan-400 font-bold">Ты огромная молодец, я тобой горжусь!</span></p>
                                    
                                    <p className="px-3">Но расслабляться рано. Месяц 3 — время пробивать плато и растить силовые. Мы добавили <span className="text-white font-bold bg-white/10 px-1.5 py-0.5 rounded-md">креатин</span>, <span className="text-white font-bold bg-white/10 px-1.5 py-0.5 rounded-md">псиллиум</span>, диапазон в <span className="text-white font-bold bg-white/10 px-1.5 py-0.5 rounded-md">12-14 повторений</span> и по одному крутому упражнению. А еще легализовали пятничный <span className="text-orange-400 font-bold">Чит-мил</span>!</p>

                                    <div className="bg-gradient-to-br from-slate-800/90 to-slate-900/90 border border-slate-700/50 rounded-[1.5rem] p-5 sm:p-6 my-7 shadow-[0_10px_30px_rgba(0,0,0,0.3)] relative overflow-hidden group">
                                        <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity">
                                            <Icon name="Lightbulb" size={90} className="text-cyan-400" />
                                        </div>
                                        <div className="relative z-10">
                                            <div className="flex items-center gap-2 mb-2.5 text-cyan-400 font-black text-sm uppercase tracking-wider">
                                                <Icon name="Lightbulb" size={18} />
                                                {PLAN_DATA.intro.eggHack.title}
                                            </div>
                                            <p className="text-xs sm:text-sm text-slate-300 leading-relaxed font-medium">
                                                {PLAN_DATA.intro.eggHack.text}
                                            </p>
                                        </div>
                                    </div>

                                    <p className="text-base sm:text-lg text-center text-white font-black italic mt-7 pt-7 border-t border-slate-700/50">
                                        {PLAN_DATA.intro.outro}
                                    </p>
                                </div>

                                <button 
                                    onClick={() => setShowIntro(false)}
                                    className="w-full bg-white text-slate-950 hover:bg-cyan-50 font-black py-4.5 sm:py-5 rounded-2xl transition-all shadow-[0_0_40px_rgba(255,255,255,0.25)] hover:shadow-[0_0_50px_rgba(255,255,255,0.35)] uppercase tracking-[0.2em] text-xs sm:text-sm flex items-center justify-center gap-3 relative overflow-hidden group active:scale-[0.98]"
                                >
                                    <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/50 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] skew-x-12"></div>
                                    <span className="relative z-10 py-1">Принято. Работаем.</span>
                                    <Icon name="ArrowRight" size={18} className="relative z-10 transition-transform group-hover:translate-x-1" />
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="fixed top-0 left-0 right-0 z-40 bg-slate-950/85 backdrop-blur-2xl border-b border-white/5 shadow-md">
                        <div className="max-w-md mx-auto px-6 py-4 flex justify-between items-center">
                            <div>
                                <div className="text-[9px] font-black text-cyan-500 uppercase tracking-[0.25em] mb-1">MARKOVMADE</div>
                                <h1 className="text-white font-black text-lg sm:text-xl tracking-tight flex items-center gap-2.5">
                                    MARIA <span className="bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-950 text-[10px] sm:text-[11px] px-2.5 py-0.5 rounded-md font-black tracking-widest shadow-sm">PRO 3.0</span>
                                </h1>
                            </div>
                            <button 
                                onClick={() => setShowIntro(true)} 
                                className="w-11 h-11 flex items-center justify-center rounded-[14px] bg-slate-800/80 text-cyan-400 hover:text-white hover:bg-slate-700 border border-slate-700 hover:border-cyan-500 transition-all shadow-sm active:scale-95"
                            >
                                <Icon name="Info" size={22} />
                            </button>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-md mx-auto px-5 sm:px-6 pt-[110px] sm:pt-[120px] pb-safe min-h-screen relative z-10">
                        {activeTab === 'home' && <HomeView checks={checks} toggleCheck={toggleCheck} />}
                        {activeTab === 'nutrition' && <NutritionView />}
                        {activeTab === 'workout' && <WorkoutView />}
                        {activeTab === 'insights' && <InsightsView />}
                    </main>

                    {/* Dock Navigation */}
                    <nav className="fixed bottom-6 sm:bottom-8 left-1/2 -translate-x-1/2 z-50 w-[92%] sm:w-[95%] max-w-[400px]">
                        <div className="bg-slate-900/85 backdrop-blur-[40px] rounded-[2.2rem] p-2 px-3 sm:px-4 flex justify-between items-center shadow-[0_25px_60px_rgba(0,0,0,0.7)] border border-slate-700/60 relative overflow-hidden">
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-[2px] bg-gradient-to-r from-transparent via-cyan-500/60 to-transparent"></div>
                            <TabButton active={activeTab === 'home'} onClick={() => setActiveTab('home')} icon="LayoutDashboard" label="Сегодня" />
                            <TabButton active={activeTab === 'nutrition'} onClick={() => setActiveTab('nutrition')} icon="Utensils" label="Еда" />
                            <TabButton active={activeTab === 'workout'} onClick={() => setActiveTab('workout')} icon="Dumbbell" label="Зал" />
                            <TabButton active={activeTab === 'insights'} onClick={() => setActiveTab('insights')} icon="Brain" label="Инфо" />
                        </div>
                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
