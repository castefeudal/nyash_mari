<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(10, 25, 41, 0.85); 
            --neon-cyan: #22d3ee;
            --neon-blue: #3b82f6;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; /* Slate 950 */
            color: #e2e8f0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Ambient Background blobs */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.06), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(37, 99, 235, 0.06), transparent 25%);
            pointer-events: none;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <div id="root"></div>

        // --- Icons Helper ---
        const Icon = ({ name, size = 24, className = "", ...props }) => {
            if (!window.lucide) return null;
            const IconDef = lucide.icons[name];
            if (!IconDef) return null;

            return React.createElement('svg', {
                xmlns: "http://www.w3.org/2000/svg",
                width: size,
                height: size,
                viewBox: "0 0 24 24",
                fill: "none",
                stroke: "currentColor",
                strokeWidth: 2,
                strokeLinecap: "round",
                strokeLinejoin: "round",
                className: `lucide lucide-${name.toLowerCase()} ${className}`,
                ...props
            }, ...IconDef.map(([tag, attrs]) => React.createElement(tag, attrs)));
        };

        // --- COMPONENTS ---

        const Card = ({ children, className = "", noPad = false }) => (
            <div className={`glass-panel rounded-[2rem] overflow-hidden transition-transform duration-500 hover:scale-[1.01] ${noPad ? '' : 'p-6'} ${className}`}>
                {children}
            </div>
        );

        const SectionHeader = ({ icon, title }) => (
            <div className="flex items-center gap-3 mb-6 pl-2">
                <div className="relative">
                    <div className="absolute inset-0 bg-cyan-500 blur-lg opacity-30 rounded-full"></div>
                    <Icon name={icon} className="relative text-cyan-400" size={26} />
                </div>
                <h2 className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-200 tracking-tight uppercase">
                    {title}
                </h2>
            </div>
        );

        const Badge = ({ text, color = "cyan" }) => {
            const colors = {
                cyan: "bg-cyan-500/10 text-cyan-400 border-cyan-500/30",
                purple: "bg-purple-500/10 text-purple-400 border-purple-500/30",
                orange: "bg-orange-500/10 text-orange-400 border-orange-500/30",
                pink: "bg-pink-500/10 text-pink-400 border-pink-500/30",
            };
            return (
                <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border ${colors[color] || colors.cyan}`}>
                    {text}
                </span>
            );
        };

        // --- VIEWS ---

        const HomeView = ({ checks, toggleCheck }) => {
            const completed = Object.values(checks).filter(Boolean).length;
            const total = PLAN_DATA.schedule.length;
            const progress = Math.round((completed / total) * 100);

            return (
                <div className="space-y-8 pb-32 animate-fade-in">
                    {/* Hero Progress */}
                    <div className="relative rounded-[2.5rem] p-8 overflow-hidden bg-gradient-to-br from-cyan-600 to-blue-700 shadow-[0_10px_40px_-10px_rgba(6,182,212,0.5)]">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-10 blur-3xl rounded-full -mr-20 -mt-20"></div>
                        <div className="absolute bottom-0 left-0 w-40 h-40 bg-cyan-300 opacity-20 blur-3xl rounded-full -ml-10 -mb-10"></div>
                        
                        <div className="relative z-10">
                            <div className="flex justify-between items-end mb-4">
                                <div>
                                    <div className="text-cyan-100/90 font-bold text-xs uppercase tracking-[0.2em] mb-1">Твой прогресс</div>
                                    <div className="text-5xl font-black text-white tracking-tighter">{progress}%</div>
                                </div>
                                <Icon name="Activity" className="text-cyan-200 opacity-90" size={40} />
                            </div>
                            
                            <div className="h-2 bg-black/30 rounded-full overflow-hidden backdrop-blur-md">
                                <div 
                                    className="h-full bg-white shadow-[0_0_15px_rgba(255,255,255,0.8)] transition-all duration-1000 ease-out" 
                                    style={{ width: `${progress}%` }} 
                                />
                            </div>
                            
                            <p className="mt-4 text-white text-sm font-medium opacity-90 leading-relaxed">
                                {progress === 100 
                                    ? "Идеально. Ты становишься лучше с каждым днем. 🌊" 
                                    : "Дисциплина — это решение делать то, чего очень не хочется делать, чтобы достичь того, чего очень хочется достичь."}
                            </p>
                        </div>
                    </div>

                    {/* Schedule List */}
                    <div className="space-y-3">
                        {PLAN_DATA.schedule.map((item, idx) => {
                            const isDone = checks[idx];
                            return (
                                <div 
                                    key={idx}
                                    onClick={() => toggleCheck(idx)}
                                    className={`group relative p-5 rounded-2xl border transition-all duration-300 cursor-pointer overflow-hidden ${
                                        isDone 
                                        ? 'bg-slate-900/30 border-slate-800 opacity-60' 
                                        : 'glass-card hover:border-cyan-500/30 hover:bg-slate-800/50'
                                    }`}
                                >
                                    <div className="flex items-center gap-5 relative z-10">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center transition-all duration-500 ${
                                            isDone 
                                            ? 'bg-cyan-600 text-white scale-90 shadow-[0_0_15px_rgba(34,211,238,0.4)]' 
                                            : 'bg-slate-800/80 text-slate-400 group-hover:text-cyan-400 group-hover:scale-110'
                                        }`}>
                                            {isDone ? <Icon name="Check" size={20} strokeWidth={3} /> : <Icon name={item.icon} size={20} />}
                                        </div>
                                        
                                        <div className="flex-1">
                                            <div className={`text-[10px] font-black uppercase tracking-widest mb-1 transition-colors ${
                                                isDone ? 'text-slate-500' : 'text-cyan-500'
                                            }`}>
                                                {item.time}
                                            </div>
                                            <div className={`text-base font-medium transition-all ${
                                                isDone ? 'text-slate-500 line-through decoration-slate-600' : 'text-slate-200 group-hover:text-white'
                                            }`}>
                                                {item.task}
                                            </div>
                                        </div>
                                        
                                        <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${
                                            isDone ? 'border-cyan-600 bg-cyan-600' : 'border-slate-600 group-hover:border-cyan-500/50'
                                        }`}>
                                            {isDone && <Icon name="Check" size={12} className="text-white" strokeWidth={4} />}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const NutritionView = () => (
            <div className="space-y-8 pb-32 animate-fade-in">
                
                {/* Visual Guide */}
                <Card className="relative overflow-hidden border-cyan-500/20">
                    <div className="absolute top-0 right-0 w-40 h-40 bg-cyan-500/10 blur-3xl rounded-full"></div>
                    <SectionHeader icon="Hand" title={PLAN_DATA.nutrition.method.title} />
                    
                    <div className="bg-slate-900/60 border border-slate-700/50 rounded-2xl p-4 text-center mb-6 backdrop-blur-sm">
                        <div className="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-2">Цель на день</div>
                        <div className="text-xl sm:text-2xl font-black text-white tracking-tight">{PLAN_DATA.nutrition.macros}</div>
                    </div>

                    <p className="text-slate-300 text-sm mb-6 leading-relaxed border-l-2 border-cyan-500 pl-4 font-medium">
                        {PLAN_DATA.nutrition.method.desc}
                    </p>

                    <div className="grid gap-4">
                        {PLAN_DATA.nutrition.method.items.map((item, i) => (
                            <div key={i} className="flex items-start gap-4 p-4 rounded-xl bg-slate-800/40 border border-slate-700/50">
                                <div className="p-3 rounded-lg bg-slate-900 text-cyan-400 shadow-lg border border-slate-800">
                                    <Icon name={item.icon === "drumstick" ? "Utensils" : item.icon === "soup" ? "Coffee" : "Carrot"} size={20} />
                                </div>
                                <div>
                                    <h4 className="font-bold text-white text-sm mb-1">{item.name}</h4>
                                    <div className="text-cyan-400 font-bold text-xs uppercase tracking-wide mb-1">{item.visual}</div>
                                    <div className="text-slate-400 text-xs italic">{item.examples}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                </Card>

                {/* Sugar Rule */}
                <div className="relative p-6 rounded-2xl border border-pink-500/30 bg-gradient-to-r from-pink-900/30 to-transparent overflow-hidden">
                    <div className="absolute -left-4 -top-4 w-20 h-20 bg-pink-500/20 blur-xl rounded-full"></div>
                    <div className="relative z-10 flex gap-4">
                        <div className="p-3 bg-pink-500/10 rounded-full h-fit text-pink-400 border border-pink-500/20">
                            <Icon name="Flame" size={24} />
                        </div>
                        <div>
                            <h3 className="font-bold text-pink-200 text-lg mb-1">{PLAN_DATA.nutrition.sugarRule.title}</h3>
                            <p className="text-white font-medium text-sm mb-2">{PLAN_DATA.nutrition.sugarRule.text}</p>
                            <p className="text-pink-200/80 text-xs">{PLAN_DATA.nutrition.sugarRule.desc}</p>
                        </div>
                    </div>
                </div>
                
                {/* Protein Rule */}
                <div className="p-5 bg-blue-900/20 rounded-2xl border border-blue-500/30 backdrop-blur-sm mt-4">
                    <div className="flex items-center gap-2 mb-2">
                        <Icon name="Zap" size={18} className="text-blue-400" />
                        <h3 className="font-bold text-blue-100 text-sm">{PLAN_DATA.nutrition.proteinRule.title}</h3>
                    </div>
                    <p className="text-white font-medium text-sm mb-1">{PLAN_DATA.nutrition.proteinRule.text}</p>
                    <p className="text-slate-400 text-xs">{PLAN_DATA.nutrition.proteinRule.desc}</p>
                </div>

                {/* SWAPS INTEGRATION (INSERTED HERE) */}
                <div className="mt-6 mb-6">
                    <SectionHeader icon="Repeat" title="Шпаргалка замен" />
                    <div className="grid gap-3">
                        {PLAN_DATA.nutrition.swaps.map((swap, i) => (
                            <div key={i} className="glass-card p-4 rounded-xl border border-slate-700/50 relative overflow-hidden group hover:border-emerald-500/50 transition-colors">
                                <div className="absolute top-0 right-0 p-2 opacity-10 text-emerald-500">
                                     <Icon name="RefreshCw" size={40} />
                                </div>
                                <h4 className="text-emerald-400 font-bold text-xs uppercase tracking-widest mb-2 flex items-center gap-2">
                                     <div className="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
                                     {swap.cat}
                                </h4>
                                <p className="text-slate-200 text-sm font-medium leading-relaxed">
                                    {swap.items}
                                </p>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Meals */}
                <div className="space-y-6">
                    <SectionHeader icon="Utensils" title="Меню на день" />
                    {PLAN_DATA.nutrition.meals.map((meal) => (
                        <div key={meal.id} className="group glass-panel rounded-3xl p-6 border-l-4 border-l-cyan-500 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-15 transition-opacity">
                                <Icon name={meal.icon} size={100} />
                            </div>
                            
                            <div className="flex items-center gap-4 mb-4 border-b border-slate-700/50 pb-4">
                                <Badge text={meal.time} />
                                <h3 className="text-lg font-bold text-white">{meal.name}</h3>
                            </div>

                            <div className="space-y-4 relative z-10">
                                <div>
                                    <div className="text-[10px] font-bold text-slate-400 uppercase mb-1">Меню</div>
                                    <p className="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap font-medium">{meal.what}</p>
                                </div>
                                
                                <div className="bg-cyan-950/30 p-4 rounded-xl border border-cyan-500/20">
                                    <div className="text-[10px] font-bold text-cyan-500 uppercase mb-1">Зачем это нужно</div>
                                    <p className="text-cyan-100/90 text-xs italic">{meal.why}</p>
                                </div>

                                <ul className="space-y-2">
                                    {meal.tips.map((tip, i) => (
                                        <li key={i} className="flex gap-2 text-xs text-slate-300">
                                            <Icon name="Info" size={14} className="text-cyan-500 shrink-0 mt-0.5" />
                                            {tip}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const WorkoutView = () => {
            const [day, setDay] = useState('day1');
            const data = PLAN_DATA.workouts[day];
            const days = [
                { id: 'day1', title: 'День 1', sub: 'Ягодицы' },
                { id: 'day2', title: 'День 2', sub: 'Спина' },
                { id: 'day3', title: 'День 3', sub: 'Ноги' },
                { id: 'day4', title: 'День 4', sub: 'Плечи' }
            ];

            return (
                <div className="space-y-6 pb-32 animate-fade-in">
                    {/* Day Selector */}
                    <div className="sticky top-20 z-30 bg-slate-900/90 backdrop-blur-xl p-2 rounded-2xl flex overflow-x-auto hide-scrollbar gap-2 shadow-2xl border border-slate-700/50">
                        {days.map((d) => (
                            <button 
                                key={d.id}
                                onClick={() => setDay(d.id)}
                                className={`flex-1 min-w-[85px] py-3 rounded-xl flex flex-col items-center justify-center transition-all duration-300 ${
                                    day === d.id 
                                    ? 'bg-cyan-600 text-white shadow-[0_0_20px_rgba(34,211,238,0.3)]' 
                                    : 'bg-transparent text-slate-400 hover:bg-white/5 hover:text-white'
                                }`}
                            >
                                <span className="text-xs font-black uppercase tracking-wider">{d.title}</span>
                                <span className={`text-[9px] mt-0.5 font-medium ${day === d.id ? 'text-cyan-100' : 'text-cyan-500/70'}`}>{d.sub}</span>
                            </button>
                        ))}
                    </div>

                    <Card>
                        {/* Warmup */}
                        <div className="mb-8">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="p-2 bg-orange-500/20 text-orange-400 rounded-lg border border-orange-500/20">
                                    <Icon name="Activity" size={20} />
                                </div>
                                <h3 className="font-bold text-white uppercase tracking-wide text-sm">Разминка</h3>
                            </div>
                            {PLAN_DATA.workouts.warmup.list.map((item, i) => (
                                <div key={i} className="bg-orange-900/10 border border-orange-500/20 rounded-xl p-4">
                                    <h4 className="text-orange-100 font-bold text-sm mb-2">{item.name}</h4>
                                    <p className="text-orange-100/90 text-xs leading-relaxed">{item.tech}</p>
                                </div>
                            ))}
                        </div>

                        <div className="h-px bg-gradient-to-r from-transparent via-slate-700 to-transparent mb-8"></div>

                        {/* Main Workout */}
                        <SectionHeader icon="Dumbbell" title={data.title} />
                        
                        <div className="mb-6 bg-cyan-900/20 border border-cyan-500/20 p-4 rounded-xl flex gap-3 items-start">
                            <Icon name="Info" className="text-cyan-400 shrink-0 mt-0.5" size={18} />
                            <p className="text-cyan-100 text-sm font-medium">{data.desc}</p>
                        </div>

                        <div className="space-y-3">
                            {data.list.map((item, i) => (
                                <div key={i} className="bg-slate-900/40 border border-slate-700/60 rounded-xl overflow-hidden hover:border-cyan-500/30 transition-colors group">
                                    <div className="p-5">
                                        <div className="flex justify-between items-start mb-2">
                                            <h4 className="text-white font-bold text-base group-hover:text-cyan-300 transition-colors">{item.name}</h4>
                                            {item.info && <Badge text={item.info} />}
                                        </div>
                                        <div className="flex gap-3 text-sm text-slate-300 mt-3 leading-relaxed">
                                            <div className="w-1 bg-cyan-600 rounded-full shrink-0 mt-1 h-auto"></div>
                                            <p>{item.tech}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Card>
                </div>
            );
        };

        const InsightsView = () => (
            <div className="space-y-6 pb-32 animate-fade-in">
                <Card className="border-purple-500/20">
                    <div className="flex items-center gap-3 mb-8">
                        <div className="p-3 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-xl shadow-lg shadow-purple-500/20 text-white">
                            <Icon name="Brain" size={28} />
                        </div>
                        <h2 className="text-3xl font-black text-white tracking-tighter">MINDSET</h2>
                    </div>

                    <div className="space-y-6">
                        {PLAN_DATA.insights.map((item, i) => (
                            <div key={i} className="relative pl-6 border-l border-slate-700 hover:border-cyan-500 transition-colors duration-300 group">
                                <div className="absolute -left-[5px] top-0 w-[9px] h-[9px] rounded-full bg-slate-800 border-2 border-slate-600 group-hover:bg-cyan-500 group-hover:border-cyan-500 transition-colors shadow-[0_0_10px_rgba(0,0,0,1)]"></div>
                                
                                <h3 className="text-xl font-bold text-white mb-2">{item.title}</h3>
                                <div className="space-y-3">
                                    <div className="bg-slate-900/60 p-4 rounded-xl border border-slate-800">
                                        <div className="text-[10px] font-black text-cyan-500 uppercase tracking-widest mb-1">{item.why}</div>
                                        <p className="text-slate-200 text-sm leading-relaxed">{item.text}</p>
                                    </div>
                                    <div className="flex items-center gap-2 text-xs font-medium text-emerald-400">
                                        <Icon name="Zap" size={14} />
                                        <span>Результат: <span className="text-emerald-200 italic">{item.result}</span></span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </Card>

                <div className="p-1 rounded-3xl bg-gradient-to-r from-blue-600 via-cyan-500 to-blue-600 animate-pulse">
                    <div className="bg-slate-950 rounded-[22px] p-8 text-center relative overflow-hidden">
                        <div className="absolute inset-0 bg-gradient-to-b from-cyan-500/5 to-transparent"></div>
                        <div className="relative z-10">
                            <h3 className="text-2xl font-black text-white mb-2 tracking-tight">MARKOVMADE</h3>
                            <p className="text-slate-400 text-sm mb-6">Персональное сопровождение. Маша, работаем!</p>
                            
                            <a 
                                href="https://t.me/markovmade" 
                                target="_blank" 
                                className="flex items-center justify-center gap-3 w-full bg-[#229ED9] hover:bg-[#1c8dbf] text-white py-4 rounded-xl font-bold transition-all shadow-lg shadow-cyan-500/20 active:scale-95"
                            >
                                <Icon name="MessageCircle" size={20} />
                                Отчет наставнику
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        );

        const TabButton = ({ active, onClick, icon, label }) => (
            <button 
                onClick={onClick}
                className="flex-1 group relative flex flex-col items-center justify-center py-2"
            >
                <div className={`p-1.5 rounded-2xl mb-1 transition-all duration-300 ${
                    active 
                    ? 'bg-cyan-500 text-white shadow-[0_0_15px_rgba(34,211,238,0.5)] translate-y-[-5px]' 
                    : 'text-slate-400 group-hover:text-cyan-200'
                }`}>
                    <Icon name={icon} size={24} strokeWidth={active ? 2.5 : 2} />
                </div>
                <span className={`text-[10px] font-bold tracking-widest transition-colors ${
                    active ? 'text-white' : 'text-slate-500'
                }`}>
                    {label}
                </span>
                
                {active && (
                    <div className="absolute bottom-0 w-1 h-1 bg-cyan-500 rounded-full blur-[2px]"></div>
                )}
            </button>
        );

        // --- MAIN APP ---

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [checks, setChecks] = useState({});
            const [showIntro, setShowIntro] = useState(true);

            useEffect(() => {
                const today = new Date().toISOString().split('T')[0];
                const lastDate = localStorage.getItem('maria_date');
                const storedChecks = JSON.parse(localStorage.getItem('maria_checks') || '{}');

                if (lastDate !== today) {
                    localStorage.setItem('maria_date', today);
                    localStorage.setItem('maria_checks', '{}');
                    setChecks({});
                } else {
                    setChecks(storedChecks);
                }
            }, []);

            const toggleCheck = (idx) => {
                const newChecks = { ...checks, [idx]: !checks[idx] };
                setChecks(newChecks);
                localStorage.setItem('maria_checks', JSON.stringify(newChecks));
            };

            return (
                <div className="min-h-screen relative">
                    
                    {/* Welcome Modal */}
                    {showIntro && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-slate-950/90 backdrop-blur-2xl animate-in fade-in duration-500">
                            <div className="w-full max-w-md bg-slate-900 border border-slate-700 rounded-3xl p-8 shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 via-blue-500 to-purple-500"></div>
                                <div className="text-center mb-8">
                                    <div className="text-[10px] font-black text-cyan-500 uppercase tracking-[0.4em] mb-4 opacity-80">MARKOVMADE</div>
                                    <h1 className="text-4xl font-black text-white tracking-tighter mb-2">MARIA <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">НЯШКА-ФИТОНЯШКА</span></h1>
                                    <p className="text-slate-400 text-sm font-medium">Персональный план трансформации</p>
                                </div>
                                <div className="space-y-4 text-slate-300 mb-8 text-sm leading-relaxed text-center font-medium">
                                    {PLAN_DATA.intro.text.map((p, i) => <p key={i}>{p}</p>)}
                                </div>
                                <button 
                                    onClick={() => setShowIntro(false)}
                                    className="w-full bg-white text-black hover:bg-cyan-50 font-black py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(255,255,255,0.3)] uppercase tracking-widest text-xs flex items-center justify-center gap-2"
                                >
                                    <span>Принято. Работаем.</span>
                                    <Icon name="ArrowRight" size={16} />
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="fixed top-0 left-0 right-0 z-40 glass-panel border-b-0 border-b-slate-800/50 bg-slate-950/80">
                        <div className="max-w-md mx-auto px-6 py-4 flex justify-between items-center">
                            <div>
                                <div className="text-[9px] font-black text-cyan-500 uppercase tracking-[0.25em] mb-1">MARKOVMADE</div>
                                <h1 className="text-white font-black text-lg tracking-tight flex items-center gap-2">
                                    MARIA <span className="bg-cyan-500 text-slate-950 text-[10px] px-1.5 py-0.5 rounded font-bold">ТАРИФ PRO 30</span>
                                </h1>
                            </div>
                            <button 
                                onClick={() => setShowIntro(true)} 
                                className="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800 text-slate-400 hover:text-white border border-slate-700 hover:border-cyan-500 transition-colors"
                            >
                                <Icon name="Info" size={20} />
                            </button>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-md mx-auto px-5 pt-24 min-h-screen">
                        {activeTab === 'home' && <HomeView checks={checks} toggleCheck={toggleCheck} />}
                        {activeTab === 'nutrition' && <NutritionView />}
                        {activeTab === 'workout' && <WorkoutView />}
                        {activeTab === 'insights' && <InsightsView />}
                    </main>

                    {/* Dock Navigation */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-[360px]">
                        <div className="glass-panel rounded-3xl p-2 px-4 flex justify-between items-center shadow-[0_10px_40px_rgba(0,0,0,0.5)] border border-white/10">
                            <TabButton active={activeTab === 'home'} onClick={() => setActiveTab('home')} icon="LayoutDashboard" label="Сегодня" />
                            <TabButton active={activeTab === 'nutrition'} onClick={() => setActiveTab('nutrition')} icon="Utensils" label="Еда" />
                            <TabButton active={activeTab === 'workout'} onClick={() => setActiveTab('workout')} icon="Dumbbell" label="Зал" />
                            <TabButton active={activeTab === 'insights'} onClick={() => setActiveTab('insights')} icon="Brain" label="Инфо" />
                        </div>
                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
